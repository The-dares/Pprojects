{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="container">

            <h2>Login</h2>

            <p>
                Sign in to access your dashboard and documents.
            </p>

            <form method="POST">
                {% csrf_token %}

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                <p>
                    Don't have an account?
                </p>

                <a href="/register/">
                    Create Account
                </a>
                
            </div>

        </div>

    </div>
    

</body>
</html>
